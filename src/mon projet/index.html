<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test API Vercel</title>
</head>
<body>
    <h1>Données Dynamiques Récupérées :</h1>
    <pre id="output">Chargement des données...</pre>

    <script>
        async function fetchData() {
            try {
                // On appelle les TROIS routes en même temps
                const [resUsers, resProducts, resBrands] = await Promise.all([
                    fetch('/api/users'),
                    fetch('/api/products'),
                    fetch('/api/brands')
                ]);

                const users = await resUsers.json();
                const products = await resProducts.json();
                const brands = await resBrands.json();

                // Affichage global de toutes les données dans la page
                document.getElementById('output').textContent = JSON.stringify({ users, products, brands }, null, 2);
            } catch (error) {
                document.getElementById('output').textContent = "Erreur : " + error.message;
            }
        }
       
        // Lancer l'appel au chargement de la page
        fetchData();
    </script>
</body>
</html>
